name: Daily Bread Xen Cell Conformance
on:
  pull_request:
    paths: ['config/xen-cell.daily-bread-alpha1.json','docs/XAO-008-XEN-FIXES-XEN-ALPHA-1.md','tests/xen-cell-contract.test.mjs','.github/workflows/xen-alpha1-cell.yml']
  workflow_dispatch:
permissions: {contents: read}
jobs:
  cell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 22}
      - run: node --test tests/xen-cell-contract.test.mjs
