name: Daily Bread Source Freshness

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Enforce source freshness
        run: python scripts/validate_source_freshness.py --max-age-hours 36
      - name: Preserve freshness evidence
        if: always()
        run: python scripts/validate_source_freshness.py --max-age-hours 36 > source-freshness-report.json || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: source-freshness-report
          path: source-freshness-report.json
