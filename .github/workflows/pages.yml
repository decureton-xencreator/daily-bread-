name: Publish XDBS Daily Bread

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "archive/**"
      - "editions/**"
      - "assets/**"
      - "app/**"
      - "data/**"
      - "schemas/**"
      - "releases/**"
      - "manifest.webmanifest"
      - "service-worker.js"
      - "scripts/**"
      - ".nojekyll"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate publication structure
        run: |
          python scripts/validate_site.py
          python scripts/validate_xdbs_v3_sync.py
          python scripts/validate_source_freshness.py --max-age-hours 36
          node scripts/validate_academy_runtime.mjs
          node --test tests/saturday-mirror.test.mjs
          node --test tests/alpha-one-*.test.mjs

  deploy:
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build immutable publication artifact
        shell: bash
        run: |
          mkdir -p _site
          rsync -a --exclude '.git' --exclude '_site' ./ _site/
          mkdir -p _site/.well-known
          printf '{"schema":"xen/alpha-one-release-marker/v1","commit":"%s","endpoint":"https://decureton-xencreator.github.io/daily-bread-/","state":"DEPLOYED"}\n' "${{ github.sha }}" > _site/.well-known/xen-alpha-one-release.json
      - name: Configure or enable GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
