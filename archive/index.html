<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#05080f"><title>Daily Bread Archive</title><link rel="stylesheet" href="../assets/css/xdbs.css"></head><body><main style="margin:0;padding-top:0"><div class="content"><header style="padding:60px 0 20px"><p class="kicker">XDBS / ARCHIVE & MEMORY</p><h1 style="font-size:clamp(3rem,8vw,7rem);letter-spacing:-.06em;line-height:.9">Days become<br>waypoints.</h1><p class="lede">Search permanent editions by date, operating mode, release or major event.</p><a class="quiet button-link" href="../">← Current edition</a></header><section class="module"><label><span class="sr-only">Search editions</span><input id="q" type="search" placeholder="Search archive…"></label><div id="list" class="archive-cards" style="margin-top:20px"></div></section></div></main><script type="module">const d=await fetch('../data/editions.json').then(r=>r.json()),list=document.querySelector('#list'),q=document.querySelector('#q');function draw(){const s=q.value.toLowerCase();list.innerHTML=d.editions.filter(e=>JSON.stringify(e).toLowerCase().includes(s)).map(e=>`<a class="archive-card" href="../${e.path}"><small>${e.date} · ${e.version}</small><h3>${e.title}</h3><p>${e.summary}</p><span class="badge">${e.mode}</span></a>`).join('')||'<p>No editions match.</p>'}q.oninput=draw;draw()</script></body></html>
